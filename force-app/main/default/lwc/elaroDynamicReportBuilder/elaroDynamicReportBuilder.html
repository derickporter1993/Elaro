<template>
  <lightning-card title={label.CardTitle} icon-name="custom:custom63">
    <div class="slds-p-around_medium">
      <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_medium">
          <lightning-spinner alternative-text={label.SpinnerAlt} size="medium"></lightning-spinner>
        </div>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_medium">
          <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small" aria-hidden="true"></lightning-icon>
          {errorMessage}
        </div>
      </template>

      <template lwc:if={notLoading}>
        <!-- Object Selection -->
        <lightning-combobox
          label={label.SelectObject}
          value={selectedObject}
          options={objectOptions}
          onchange={handleObjectChange}
          placeholder={label.ChooseObject}
        ></lightning-combobox>

        <!-- Field Selection -->
        <template lwc:if={fieldsLoaded}>
          <div class="slds-m-top_medium">
            <lightning-dual-listbox
              label={label.SelectFields}
              source-label={label.AvailableFields}
              selected-label={label.SelectedFields}
              options={availableFields}
              value={selectedFields}
              onchange={handleFieldChange}
              min="1"
              max="20"
            ></lightning-dual-listbox>
          </div>
        </template>

        <!-- Filters Section -->
        <template lwc:if={showFilters}>
          <div class="slds-m-top_medium">
            <h3 class="slds-text-heading_small">{label.FiltersHeading}</h3>
            <template for:each={filters} for:item="filter">
              <div key={filter.id} class="slds-grid slds-gutters slds-m-top_small">
                <div class="slds-col slds-size_1-of-4">
                  <lightning-combobox
                    label={label.FieldLabel}
                    value={filter.field}
                    options={filterableFields}
                    onchange={handleFilterFieldChange}
                    data-filter-id={filter.id}
                  ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-4">
                  <lightning-combobox
                    label={label.OperatorLabel}
                    value={filter.operator}
                    options={operatorOptions}
                    onchange={handleFilterOperatorChange}
                    data-filter-id={filter.id}
                  ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-3">
                  <lightning-input
                    label={label.ValueLabel}
                    value={filter.value}
                    onchange={handleFilterValueChange}
                    data-filter-id={filter.id}
                  ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-12">
                  <lightning-button-icon
                    icon-name="utility:delete"
                    alternative-text={label.RemoveFilter}
                    onclick={handleRemoveFilter}
                    data-filter-id={filter.id}
                    class="slds-m-top_large"
                  ></lightning-button-icon>
                </div>
              </div>
            </template>
            <lightning-button
              label={label.AddFilter}
              onclick={handleAddFilter}
              class="slds-m-top_small"
            ></lightning-button>
          </div>
        </template>

        <!-- Sort Options -->
        <template lwc:if={showSortOptions}>
          <div class="slds-m-top_medium">
            <div class="slds-grid slds-gutters">
              <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                  label={label.SortBy}
                  value={sortBy}
                  options={sortableFields}
                  onchange={handleSortByChange}
                ></lightning-combobox>
              </div>
              <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                  label={label.SortDirection}
                  value={sortDirection}
                  options={sortDirectionOptions}
                  onchange={handleSortDirectionChange}
                ></lightning-combobox>
              </div>
            </div>
          </div>
        </template>

        <!-- Row Limit -->
        <div class="slds-m-top_medium">
          <lightning-input
            type="number"
            label={label.MaxRows}
            value={maxRows}
            min="1"
            max="10000"
            onchange={handleMaxRowsChange}
          ></lightning-input>
        </div>

        <!-- Action Buttons -->
        <div class="slds-m-top_large">
          <lightning-button
            variant="brand"
            label={label.RunReport}
            onclick={handleRunReport}
            disabled={isRunDisabled}
            class="slds-m-right_small"
          ></lightning-button>
          <lightning-button
            variant="neutral"
            label={label.ClearBtn}
            onclick={handleClear}
            disabled={isLoading}
          ></lightning-button>
        </div>

        <!-- Results Section -->
        <template lwc:if={hasResults}>
          <div class="slds-m-top_large" role="region" aria-label={label.Results}>
            <h3 class="slds-text-heading_small">{label.Results} ({recordCount} records)</h3>
            <lightning-datatable
              key-field="Id"
              data={reportData}
              columns={columns}
              hide-checkbox-column
              show-row-number-column
            ></lightning-datatable>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
