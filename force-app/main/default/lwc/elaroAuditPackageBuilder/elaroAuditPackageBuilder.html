<template>
  <lightning-card title={label.cardTitle} icon-name="standard:audit">
    <div class="slds-var-p-around_medium">
      <lightning-input
        label={label.packageName}
        value={packageName}
        onchange={handlePackageNameChange}
        required
      ></lightning-input>

      <lightning-combobox
        label={label.framework}
        value={framework}
        options={frameworks}
        onchange={handleFrameworkChange}
        required
      ></lightning-combobox>

      <lightning-input
        type="date"
        label={label.auditPeriodStart}
        value={startDate}
        onchange={handleStartDateChange}
        required
      ></lightning-input>

      <lightning-input
        type="date"
        label={label.auditPeriodEnd}
        value={endDate}
        onchange={handleEndDateChange}
        required
      ></lightning-input>

      <lightning-button
        label={label.generatePackage}
        variant="brand"
        onclick={handleGenerate}
        disabled={isLoading}
        class="slds-var-m-top_medium"
      ></lightning-button>
    </div>
  </lightning-card>
</template>
