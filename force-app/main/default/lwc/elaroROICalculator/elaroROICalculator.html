<template>
  <div class="roi-calculator" role="region" aria-label={label.ROI_Heading}>
    <div class="calculator-header">
      <h2>{label.ROI_Heading}</h2>
      <p class="subtitle">{label.ROI_Subtitle}</p>
    </div>

    <div class="calculator-inputs" role="group" aria-label={label.ROI_Heading}>
      <div class="input-group">
        <lightning-combobox
          label={label.ROI_IndustryLabel}
          value={industry}
          options={industryOptions}
          onchange={handleIndustryChange}
        >
        </lightning-combobox>
      </div>

      <div class="input-group">
        <lightning-input
          type="number"
          label={label.ROI_OrgSizeLabel}
          value={orgSize}
          onchange={handleOrgSizeChange}
        >
        </lightning-input>
      </div>

      <div class="input-group">
        <lightning-input
          type="number"
          label={label.ROI_AuditSpendLabel}
          value={currentAuditSpend}
          formatter="currency"
          onchange={handleAuditSpendChange}
        >
        </lightning-input>
      </div>

      <div class="input-group">
        <lightning-input
          type="number"
          label={label.ROI_AuditPrepHoursLabel}
          value={currentAuditPrepHours}
          onchange={handleHoursChange}
        >
        </lightning-input>
      </div>

      <div class="input-group">
        <lightning-input
          type="number"
          label={label.ROI_HourlyRateLabel}
          value={hourlyRate}
          formatter="currency"
          onchange={handleRateChange}
        >
        </lightning-input>
      </div>
    </div>

    <template lwc:if={showResults}>
      <div class="roi-results" role="region" aria-label={label.ROI_AnalysisHeading}>
        <div class="results-header">
          <h3>{label.ROI_AnalysisHeading}</h3>
        </div>

        <div class="results-grid" role="group" aria-label={label.ROI_AnalysisHeading}>
          <div class="result-card savings" role="article" aria-label={label.ROI_TimeSavings}>
            <div class="result-label">{label.ROI_TimeSavings}</div>
            <div class="result-value" aria-live="polite">{roiResults.timeSavings} hours</div>
            <div class="result-detail">${formattedTimeSavingsDollars} in labor costs</div>
          </div>

          <div class="result-card savings" role="article" aria-label={label.ROI_AuditCostReduction}>
            <div class="result-label">{label.ROI_AuditCostReduction}</div>
            <div class="result-value" aria-live="polite">${formattedAuditCostReduction}</div>
            <div class="result-detail">{label.ROI_AuditCostDetail}</div>
          </div>

          <div class="result-card total" role="article" aria-label={label.ROI_TotalSavings}>
            <div class="result-label">{label.ROI_TotalSavings}</div>
            <div class="result-value" aria-live="polite">${formattedTotalSavings}</div>
            <div class="result-detail">${formattedMonthlySavings}/month</div>
          </div>

          <div class="result-card cost" role="article" aria-label={label.ROI_ElaroCost}>
            <div class="result-label">{label.ROI_ElaroCost}</div>
            <div class="result-value" aria-live="polite">${formattedElaroCost}</div>
          </div>

          <div class="result-card net" role="article" aria-label={label.ROI_NetBenefit}>
            <div class="result-label">{label.ROI_NetBenefit}</div>
            <div class="result-value {roiClass}" aria-live="polite">${formattedNetBenefit}</div>
          </div>

          <div class="result-card roi" role="article" aria-label={label.ROI_ROILabel}>
            <div class="result-label">{label.ROI_ROILabel}</div>
            <div class="result-value {roiClass}" aria-live="polite">{roiResults.roi}%</div>
            <div class="result-detail">{paybackMessage}</div>
          </div>
        </div>

        <div class="roi-summary">
          <template lwc:if={hasPositiveROI}>
            <div class="summary-positive">
              <strong>{paybackSummary}</strong>
              <p>{savingsSummary}</p>
            </div>
          </template>
          <template lwc:if={hasNegativeROI}>
            <div class="summary-negative">
              <strong>{label.ROI_AdjustInputs}</strong>
              <p>{label.ROI_TypicalReduction}</p>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</template>
