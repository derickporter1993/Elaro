<template>
  <lightning-card title={label.TREND_Title} icon-name="custom:custom63">
    <div class="slds-p-around_medium">
      <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_medium">
          <lightning-spinner alternative-text={label.TREND_LoadingSpinner} size="medium"></lightning-spinner>
        </div>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_medium" role="alert">
          <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small" aria-hidden="true"></lightning-icon>
          {errorMessage}
        </div>
      </template>

      <template lwc:if={notLoading}>
        <!-- Configuration -->
        <div class="slds-grid slds-gutters slds-m-bottom_medium">
          <div class="slds-col slds-size_1-of-4">
            <lightning-combobox
              label={label.TREND_ObjectLabel}
              value={selectedObject}
              options={objectOptions}
              onchange={handleObjectChange}
            ></lightning-combobox>
          </div>
          <div class="slds-col slds-size_1-of-4">
            <lightning-combobox
              label={label.TREND_DateFieldLabel}
              value={dateField}
              options={dateFields}
              onchange={handleDateFieldChange}
            ></lightning-combobox>
          </div>
          <div class="slds-col slds-size_1-of-4">
            <lightning-combobox
              label={label.TREND_MetricFieldLabel}
              value={metricField}
              options={metricFields}
              onchange={handleMetricFieldChange}
            ></lightning-combobox>
          </div>
          <div class="slds-col slds-size_1-of-4">
            <lightning-combobox
              label={label.TREND_GranularityLabel}
              value={granularity}
              options={granularityOptions}
              onchange={handleGranularityChange}
            ></lightning-combobox>
          </div>
        </div>

        <div class="slds-m-bottom_medium">
          <lightning-input
            type="number"
            label={label.TREND_MonthsBackLabel}
            value={monthsBack}
            min="1"
            max="36"
            onchange={handleMonthsBackChange}
          ></lightning-input>
        </div>

        <lightning-button
          label={label.TREND_AnalyzeButton}
          onclick={handleAnalyze}
          disabled={isButtonDisabled}
          variant="brand"
        ></lightning-button>

        <!-- Trend Chart Data -->
        <template lwc:if={hasResults}>
          <div class="slds-m-top_large" role="region" aria-label={label.TREND_AnalysisHeading}>
            <h3 class="slds-text-heading_small">{label.TREND_AnalysisHeading}</h3>
            <div class="slds-text-body_regular slds-m-bottom_medium">
              <p>Total: {trendTotal}</p>
              <p>Average: {trendAverage}</p>
              <p>Trend Direction: {trendDirection}</p>
            </div>
            <div class="slds-m-top_medium">
              <table class="slds-table slds-table_bordered" role="table" aria-label={label.TREND_AnalysisHeading}>
                <thead>
                  <tr>
                    <th scope="col">{label.TREND_PeriodHeader}</th>
                    <th scope="col">{label.TREND_ValueHeader}</th>
                    <th scope="col">{label.TREND_ChangeHeader}</th>
                    <th scope="col">{label.TREND_PercentChangeHeader}</th>
                  </tr>
                </thead>
                <tbody>
                  <template for:each={trendBuckets} for:item="bucket">
                    <tr key={bucket.bucketDate}>
                      <td>{bucket.bucketDate}</td>
                      <td>{bucket.metricValue}</td>
                      <td>{bucket.changeFromPrevious}</td>
                      <td>{bucket.percentChange}%</td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
