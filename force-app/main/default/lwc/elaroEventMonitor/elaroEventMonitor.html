<template>
  <lightning-card title={label.CardTitle} icon-name="standard:event">
    <div class="slds-var-p-around_medium">
      <template lwc:if={hasEvents}>
        <table
          class="slds-table slds-table_cell-buffer slds-table_bordered"
          role="table"
          aria-label={label.CardTitle}
        >
          <thead>
            <tr>
              <th scope="col">{label.ColEventType}</th>
              <th scope="col">{label.ColEntityType}</th>
              <th scope="col">{label.ColEntityId}</th>
              <th scope="col">{label.ColFramework}</th>
              <th scope="col">{label.ColTimestamp}</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={events} for:item="event">
              <tr key={event.id}>
                <td>{event.eventType}</td>
                <td>{event.entityType}</td>
                <td>{event.entityId}</td>
                <td>{event.framework}</td>
                <td>{event.timestamp}</td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>
      <template lwc:if={noEvents}>
        <p class="slds-text-align_center slds-var-p-around_medium">
          {label.NoEvents}
        </p>
      </template>
    </div>
  </lightning-card>
</template>
