<template>
    <lightning-card title={label.SEC_NewAssessmentTitle} icon-name="standard:form">
        <div class="slds-card__body slds-card__body_inner slds-p-around_medium">
            <lightning-input
                label={label.SEC_IncidentDescriptionLabel}
                data-field="description"
                onchange={handleInputChange}
                required>
            </lightning-input>
            <lightning-input
                type="datetime"
                label={label.SEC_DiscoveryDateLabel}
                data-field="discoveryDate"
                onchange={handleInputChange}
                required>
            </lightning-input>
            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label={label.SEC_CreateAssessmentButton}
                    onclick={handleSave}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
