<template>
  <lightning-card title={label.SYSMON_GovernorLimitsTitle}>
    <div class="slds-p-around_medium">
      <template lwc:if={stats}>
        <div class="slds-grid slds-wrap slds-gutters">
          <div class="slds-col slds-size_1-of-2">
            <lightning-progress-ring
              value={cpuPct}
              variant="active"
              label={label.SYSMON_CpuLabel}
            ></lightning-progress-ring>
            <p class="slds-m-top_small">CPU: {stats.cpuMs} ms</p>
          </div>
          <div class="slds-col slds-size_1-of-2">
            <lightning-progress-ring
              value={heapPct}
              variant="warning"
              label={label.SYSMON_HeapLabel}
            ></lightning-progress-ring>
            <p class="slds-m-top_small">Heap: {stats.heapKb} KB</p>
          </div>
        </div>
        <p class="slds-m-top_medium">SOQL: {stats.soql} / 100 • DML: {stats.dml} / 150</p>
      </template>
      <template lwc:if={isLoading}>
        <div class="slds-align_absolute-center slds-p-around_medium">
          <lightning-spinner alternative-text={label.SYSMON_LoadingStats} size="medium"></lightning-spinner>
        </div>
      </template>
      <div class="slds-m-top_medium">
        <lightning-button label={label.SYSMON_RefreshButton} onclick={refresh}></lightning-button>
      </div>
    </div>
  </lightning-card>
</template>
