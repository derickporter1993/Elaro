<template>
  <template lwc:if={isOpen}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true" aria-labelledby="jira-create-modal-heading" onkeydown={handleModalKeydown}>
      <div class="slds-modal__container">
        <!-- Header -->
        <header class="slds-modal__header">
          <button
            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
            title="Close"
            onclick={handleClose}
          >
            <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
          </button>
          <h2 id="jira-create-modal-heading" class="slds-modal__title slds-hyphenate">
            <lightning-icon
              icon-name="custom:custom53"
              size="small"
              class="slds-m-right_x-small"
            ></lightning-icon>
            {label.JIRA_CreateModalHeading}
          </h2>
        </header>

        <!-- Content -->
        <div class="slds-modal__content slds-p-around_medium">
          <!-- Loading -->
          <template lwc:if={isLoading}>
            <div class="slds-is-relative" style="min-height: 100px">
              <lightning-spinner alternative-text={label.JIRA_CreatingIssue} size="medium"></lightning-spinner>
            </div>
          </template>

          <template lwc:else>
            <!-- Not Configured Warning -->
            <template lwc:if={isNotConfigured}>
              <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Warning</span>
                <lightning-icon
                  icon-name="utility:warning"
                  alternative-text="Warning"
                  size="small"
                  class="slds-m-right_x-small"
                ></lightning-icon>
                <span>
                  {label.JIRA_NotConfiguredWarning}
                </span>
              </div>
            </template>

            <!-- Error Display -->
            <template lwc:if={error}>
              <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Error</span>
                <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small"></lightning-icon>
                <span>{error}</span>
              </div>
            </template>

            <!-- Form -->
            <div class="slds-form">
              <p class="slds-text-body_regular slds-m-bottom_medium">
                {label.JIRA_CreateDescription}
              </p>

              <ul class="slds-list_dotted slds-m-bottom_medium">
                <li>{label.JIRA_IncludeGapDescription}</li>
                <li>{label.JIRA_IncludeFrameworkInfo}</li>
                <li>{label.JIRA_IncludeRemediationPlan}</li>
                <li>{label.JIRA_IncludeSalesforceLink}</li>
              </ul>

              <lightning-combobox
                name="priority"
                label={label.JIRA_PriorityLabel}
                placeholder={label.JIRA_PriorityPlaceholder}
                options={priorityOptions}
                value={selectedPriority}
                onchange={handlePriorityChange}
              ></lightning-combobox>

              <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                {label.JIRA_PriorityHint}
              </p>
            </div>
          </template>
        </div>

        <!-- Footer -->
        <footer class="slds-modal__footer">
          <lightning-button label={label.JIRA_CancelButton} onclick={handleClose}></lightning-button>
          <lightning-button
            label={label.JIRA_CreateIssueButton}
            variant="brand"
            onclick={handleCreate}
            disabled={isCreateDisabled}
            icon-name="utility:add"
          ></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
