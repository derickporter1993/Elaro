<template>
  <lightning-card title={framework.framework} class={scoreClass}>
    <div class="slds-p-around_medium">
      <template lwc:if={isLoadingDetails}>
        <div class="slds-is-relative slds-p-around_medium">
          <lightning-spinner alternative-text={label.loadingDetails} size="medium"></lightning-spinner>
        </div>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_small">
          <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small" aria-hidden="true"></lightning-icon>
          <span class="slds-text-body_small">{errorMessage}</span>
        </div>
      </template>

      <div class="slds-grid slds-gutters">
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-text-heading_large">{framework.score}%</div>
          <div class="slds-text-body_small">{label.complianceScore}</div>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <lightning-icon icon-name={statusIcon} size="large" aria-hidden="true"></lightning-icon>
          <div class="slds-text-body_small">{framework.status}</div>
        </div>
      </div>
      <div class="slds-m-top_small">
        <div class="slds-text-body_small">
          {framework.compliantPolicies} / {framework.totalPolicies} {label.policiesCompliant}
        </div>
        <div class="slds-text-body_small">{framework.gapCount} {label.gaps}</div>
      </div>

      <!-- Phase 1 Framework Details -->
      <template lwc:if={hasFrameworkDetails}>
        <div class="slds-m-top_medium slds-border_top">
          <div class="slds-text-body_small slds-m-top_small">
            <strong>{label.frameworkMappings}</strong> {mappingCount}
          </div>
          <div class="slds-text-body_small"><strong>{label.evidenceItems}</strong> {evidenceCount}</div>
          <div class="slds-text-body_small"><strong>{label.requirements}</strong> {requirementCount}</div>

          <template lwc:if={hasLatestPackage}>
            <div class="slds-m-top_small slds-border_top">
              <div class="slds-text-body_small slds-text-title">
                <strong>{label.latestAuditPackage}</strong>
              </div>
              <div class="slds-text-body_small">{latestAuditPackage.name}</div>
              <div class="slds-text-body_small">
                {label.status}
                <span class={formattedLatestPackage.statusClass}>{latestAuditPackage.status}</span>
              </div>
              <div class="slds-text-body_small">
                {label.period} {formattedLatestPackage.formattedPeriodStart} -
                {formattedLatestPackage.formattedPeriodEnd}
              </div>
              <lightning-button
                label={label.viewPackage}
                variant="base"
                size="x-small"
                class="slds-m-top_x-small"
                data-package-id={latestAuditPackage.id}
                onclick={handleViewAuditPackage}
              ></lightning-button>
            </div>
          </template>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
