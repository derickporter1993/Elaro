<template>
  <lightning-card title={label.CardTitle} icon-name="standard:warning">
    <div class="slds-var-p-around_medium">
      <template lwc:if={hasRisks}>
        <div class="slds-grid slds-gutters" role="list" aria-label={label.HeatmapAriaLabel}>
          <template for:each={risksWithClasses} for:item="risk">
            <div key={risk.id} class="slds-col slds-size_1-of-4" role="listitem">
              <div class={risk.combinedClass} aria-label={risk.ariaLabel}>
                <div class="slds-text-heading_small">{risk.framework}</div>
                <div class="slds-text-body_small">{risk.severity}</div>
                <div class="slds-text-body_small">{risk.scoreText}</div>
              </div>
            </div>
          </template>
        </div>
      </template>
      <template lwc:if={noRisks}>
        <div
          class="slds-text-align_center slds-var-p-around_medium"
          role="status"
          aria-live="polite"
        >
          <p>{label.NoRiskData}</p>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
